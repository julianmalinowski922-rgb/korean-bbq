<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulgogi Haus | The Korean B.B.Q.</title>
  <meta
    name="description"
    content="Bulgogi Haus in Köln - authentisches koreanisches BBQ, Premium-Ambiente, Buffet, Bulgogi und Reservierung."
  />
  <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">
  <link rel="preconnect" href="[fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
  <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap)" rel="stylesheet">


  <style>
    :root {
      --bg: #0d0d0f;
      --bg-soft: #151519;
      --card: rgba(255,255,255,0.06);
      --card-strong: rgba(255,255,255,0.08);
      --text: #f5efe6;
      --muted: #cbbfae;
      --gold: #c9a86a;
      --gold-2: #f1d6a0;
      --red: #701d1d;
      --line: rgba(201,168,106,0.22);
      --white: #ffffff;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius: 22px;
      --radius-sm: 16px;
      --container: 1200px;
    }


    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }


    html {
      scroll-behavior: smooth;
    }


    body {
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(201,168,106,0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(112,29,29,0.16), transparent 24%),
        linear-gradient(180deg, #0b0b0d 0%, #111116 40%, #0c0c0f 100%);
      color: var(--text);
      line-height: 1.65;
      overflow-x: hidden;
    }


    img {
      max-width: 100%;
      display: block;
    }


    a {
      color: inherit;
      text-decoration: none;
    }


    .container {
      width: min(var(--container), calc(100% - 32px));
      margin: 0 auto;
    }


    .section {
      padding: 100px 0;
      position: relative;
    }


    .section-title {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.2rem, 4vw, 4rem);
      line-height: 1.05;
      margin-bottom: 14px;
      color: var(--white);
      letter-spacing: 0.02em;
    }


    .section-subtitle {
      max-width: 760px;
      color: var(--muted);
      font-size: 1.02rem;
      margin-bottom: 52px;
    }


    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold-2);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.78rem;
      margin-bottom: 18px;
    }


    .eyebrow::before {
      content: "";
      width: 38px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      display: inline-block;
    }


    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(18px);
      background: rgba(8,8,10,0.72);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }


    .nav {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }


    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }


    .brand-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.8rem;
      color: var(--white);
      line-height: 1;
    }


    .brand-sub {
      color: var(--gold-2);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }


    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
      list-style: none;
    }


    .nav-links a {
      color: #efe8dd;
      font-size: 0.95rem;
      position: relative;
      transition: color 0.25s ease;
    }


    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.25s ease;
    }


    .nav-links a:hover {
      color: var(--gold-2);
    }


    .nav-links a:hover::after {
      width: 100%;
    }


    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 24px;
      border-radius: 999px;
      border: 1px solid transparent;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }


    .btn:hover {
      transform: translateY(-2px);
    }


    .btn-primary {
      background: linear-gradient(135deg, #d6b57a, #b48b49);
      color: #1a140b;
      box-shadow: 0 12px 30px rgba(201,168,106,0.25);
    }


    .btn-primary:hover {
      box-shadow: 0 18px 40px rgba(201,168,106,0.35);
    }


    .btn-secondary {
      background: rgba(255,255,255,0.02);
      border-color: rgba(255,255,255,0.14);
      color: var(--text);
      backdrop-filter: blur(10px);
    }


    .btn-secondary:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(201,168,106,0.4);
    }


    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }


    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(7,7,9,0.88) 0%, rgba(7,7,9,0.68) 42%, rgba(7,7,9,0.35) 100%),
        url("[images.unsplash.com](https://images.unsplash.com/photo-1553163147-622ab57be1c7?auto=format&fit=crop&w=1600&q=80)") center/cover no-repeat;
      transform: scale(1.04);
    }


    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 180px;
      background: linear-gradient(to top, rgba(12,12,15,1), rgba(12,12,15,0));
    }


    .hero-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 40px;
      align-items: center;
      width: 100%;
      padding: 70px 0 40px;
    }


    .hero-content h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.2rem, 7vw, 6.2rem);
      line-height: 0.95;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
      max-width: 760px;
    }


    .hero-content p {
      max-width: 650px;
      color: #e8ddcf;
      font-size: 1.06rem;
      margin-bottom: 30px;
    }


    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 36px;
    }


    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }


    .badge {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f2e8db;
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }


    .hero-card {
      justify-self: end;
      width: min(460px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 26px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      backdrop-filter: blur(16px);
      transform: perspective(1200px) rotateY(-10deg) rotateX(4deg);
      transition: transform 0.35s ease;
    }


    .hero-card:hover {
      transform: perspective(1200px) rotateY(-4deg) rotateX(2deg) translateY(-6px);
    }


    .hero-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }


    .hero-card-top span {
      color: var(--gold-2);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }


    .hero-card-top strong {
      font-size: 1rem;
      color: var(--white);
    }


    .hero-card-image {
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
    }


    .hero-card-image img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }


    .hero-card-content h3 {
      font-family: "Cormorant Garamond", serif;
      font-size: 2rem;
      margin-bottom: 8px;
    }


    .hero-card-content p {
      color: var(--muted);
      margin-bottom: 18px;
    }


    .hero-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: #f1e8dc;
      font-size: 0.95rem;
    }


    .premium-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }


    .feature-card,
    .menu-card,
    .contact-card,
    .reservation-card,
    .hours-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.035));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }


    .feature-card {
      padding: 28px;
      transform-style: preserve-3d;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }


    .feature-card:hover {
      transform: translateY(-8px) rotateX(2deg) rotateY(-2deg);
      border-color: rgba(201,168,106,0.36);
    }


    .feature-card .icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
      font-size: 1.3rem;
      color: var(--gold-2);
      background: radial-gradient(circle at top left, rgba(201,168,106,0.18), rgba(255,255,255,0.04));
      border: 1px solid rgba(201,168,106,0.22);
    }


    .feature-card h3 {
      font-size: 1.2rem;
      margin-bottom: 10px;
      color: var(--white);
    }


    .feature-card p {
      color: var(--muted);
      font-size: 0.96rem;
    }


    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 34px;
      align
